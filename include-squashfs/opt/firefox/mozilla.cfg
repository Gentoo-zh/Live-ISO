// gigos: Firefox 界面语言自动跟随系统 LANG —— 首行必须是注释(被 Firefox 忽略)。
// live 环境由 gigos-live-lang 按 grub 的 gigos.lang 设 LANG;装好的系统由 Calamares/系统
// locale 设 LANG。本配置读 LANG → 映射到 Firefox 界面语言代码,用 defaultPref 写入
// intl.locale.requested(默认值,用户仍可在 设置→语言 手动改)。
// 简体 zh-CN、繁体 zh-TW 的 langpack 已随 L10N 装入,英文为内置;读不到 LANG 时回落英文内置。
// 注:本文件在 firefox-bin 安装目录,装好的系统首次 `emerge -u www-client/firefox-bin` 会重铺
// /opt/firefox 覆盖掉它;届时 Firefox 回到自身按 LANG 跟随(zh_CN 等仍正确)。live 与刚装好的
// 系统本配置生效——这对"live 三语言开箱即用"的目标已足够。
try {
  var env = Components.classes["@mozilla.org/process/environment;1"]
              .getService(Components.interfaces.nsIEnvironment);
  var l = env.get("LANG") || env.get("LC_ALL") || env.get("LC_MESSAGES") || "";
  var loc = "en-US";
  if (l.indexOf("zh_TW") === 0 || l.indexOf("zh_Hant") === 0) {
    loc = "zh-TW";
  } else if (l.indexOf("zh") === 0) {
    loc = "zh-CN";
  }
  defaultPref("intl.locale.requested", loc);
} catch (e) {
  // 读取环境失败则不强制,交回 Firefox 自身的 OS-locale 跟随行为
}
