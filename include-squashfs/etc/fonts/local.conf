<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- gig 默认字体:全部统一为 Noto CJK,杜绝「一半黑(Sans)一半宋(Serif)」混排。
     只装了 media-fonts/noto-cjk(含 Sans/Serif/Mono CJK,简繁日韩 + 拉丁字形),
     但无 fontconfig 规则时 generic 族解析不一致 → 部分控件回退到衬线(宋)。
     这里把三大 generic 族钉到 Noto Sans/Serif/Mono CJK SC(+ 地区兜底),并按界面语言选简/繁字形。 -->
<fontconfig>

  <!-- sans-serif → Noto Sans CJK(黑),界面默认全用它 -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK HK</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
    </prefer>
  </alias>

  <!-- serif → Noto Serif CJK(宋),仅当应用显式要衬线时才用,且也统一成 Noto -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Serif CJK KR</family>
    </prefer>
  </alias>

  <!-- monospace → Noto Sans Mono CJK(等宽,终端/代码)-->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Sans Mono CJK TC</family>
      <family>Noto Sans Mono CJK JP</family>
      <family>Noto Sans Mono CJK KR</family>
    </prefer>
  </alias>

  <!-- 把裸 "Noto Sans"/"Noto Serif"/"Noto Sans Mono"(SDDM、Plasma 默认所用名)
       也映射到对应 CJK 变体,确保界面默认字体即统一 Noto CJK,不混宋。 -->
  <match target="pattern"><test name="family"><string>Noto Sans</string></test>
    <edit name="family" mode="append" binding="strong"><string>Noto Sans CJK SC</string></edit></match>
  <match target="pattern"><test name="family"><string>Noto Serif</string></test>
    <edit name="family" mode="append" binding="strong"><string>Noto Serif CJK SC</string></edit></match>
  <match target="pattern"><test name="family"><string>Noto Sans Mono</string></test>
    <edit name="family" mode="append" binding="strong"><string>Noto Sans Mono CJK SC</string></edit></match>

  <!-- 按界面语言选对地区字形(避免 Han 统一表意用错日文字形):繁体/港用 TC/HK -->
  <match target="pattern"><test name="lang" compare="contains"><string>zh-tw</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK TC</string></edit></match>
  <match target="pattern"><test name="lang" compare="contains"><string>zh-hk</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK HK</string></edit></match>

  <!-- 渲染:抗锯齿 + 轻度 hinting(Noto 自带 hinting 质量好),灰度抗锯齿避免彩边 -->
  <match target="font"><edit name="antialias" mode="assign"><bool>true</bool></edit></match>
  <match target="font"><edit name="hinting" mode="assign"><bool>true</bool></edit></match>
  <match target="font"><edit name="hintstyle" mode="assign"><const>hintslight</const></edit></match>
  <match target="font"><edit name="rgba" mode="assign"><const>none</const></edit></match>

</fontconfig>
