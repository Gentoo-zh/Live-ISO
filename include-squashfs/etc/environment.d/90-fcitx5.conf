# fcitx5 输入法环境变量(全局)——按 Fcitx5 官方 Wayland 文档的 KDE Plasma 推荐:
#   只设 XMODIFIERS。它对 X11 与 XWayland 应用都必需,且不影响 Wayland 原生应用。
#
# 刻意【不设】GTK_IM_MODULE / QT_IM_MODULE / SDL_IM_MODULE:
#   - KDE Wayland 下 GTK3/4、Qt6 走 KWin 原生 text-input 协议,设了反而盖掉它;
#   - 全局设这两个会触发"Wayland 下候选窗口闪烁"的已知 bug。
#   GTK 的 X11/XWayland 覆盖改用 GTK 配置文件(gtk-3.0/4.0 settings.ini),
#   这样 XWayland GTK 用 fcitx、Wayland GTK 用原生 text-input,互不干扰。
XMODIFIERS=@im=fcitx
